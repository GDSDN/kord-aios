name: code
description: Software development team — the default squad for code-related work
version: 1.0.0

agents:
  chief:
    description: "Chief orchestrator for the code squad"
    mode: all
    is_chief: true
    skills:
      - git-master
  developer:
    description: "Implementation specialist — writes code, tests, and fixes bugs"
    mode: subagent
    skills:
      - git-master
      - frontend-ui-ux

components:
  tasks: []
  workflows: []
  templates: []
  checklists: []
  scripts: []
  data: []

orchestration:
  runner: workflow-engine
  delegation_mode: chief

default_executor: developer
contract_type: story

plan_template: |
  # Plan: {title}
  Squad: code
  Contract Type: story

  ## Tasks

  - [ ] **Task 1** (executor: @developer, verify: tests)
