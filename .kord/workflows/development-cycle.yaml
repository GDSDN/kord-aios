        │  (≠ Executor)│    │   Push   │    │   (Human)    │
        └──────────────┘    └──────────┘    └──────────────┘
                                                   │
                                  ┌────────────────┼────────────────┐
                                  │                │                │
                                  ▼                ▼                ▼
                               [ GO ]          [ PAUSE ]       [ ABORT ]
                                  │                │                │
                                  ▼                ▼                ▼
                             Next Story      Save State         Stop Epic
        ```
